<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>vaudit-components smoke test</title>
    <link rel="stylesheet" href="../dist/vaudit.css" />
    <!-- Anti-flicker cloak — same snippet that goes in Webflow's Head custom code. -->
    <style>
      [data-rc]:not([data-rc-mounted="true"]) { visibility: hidden; }

      /* Demo page styling (not part of the bundle). */
      body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; margin: 0; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-start; }
      .demo-section + .demo-section { margin-top: 2rem; }
      h1 { font-size: 1.25rem; margin: 0 0 0.75rem; }
      .ready-banner { display: none; padding: 0.5rem 0.75rem; background: #d1fae5; color: #065f46; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.875rem; }
      html.rc-ready .ready-banner { display: inline-block; }
      .dark-pane { background: #111; color: white; padding: 1.5rem; border-radius: 0.5rem; }
    </style>
  </head>
  <body>
    <div class="ready-banner">html.rc-ready is set — all initial markers mounted.</div>

    <section class="demo-section">
      <h1>Light surface (inherits page font)</h1>
      <div class="demo-grid">
        <div data-rc="hello"></div>
        <div data-rc="hello" data-prop='{"name": "Aung"}'></div>
        <div data-rc="hello" data-prop='{"name": "muted state", "muted": true}'></div>
      </div>
    </section>

    <section class="demo-section dark-pane">
      <h1>Dark surface (color: white)</h1>
      <div class="demo-grid">
        <div data-rc="hello" data-prop='{"name": "on dark"}'></div>
      </div>
    </section>

    <script src="../dist/vaudit.js"></script>
  </body>
</html>
